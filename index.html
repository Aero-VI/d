<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Sam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      z-index: 2;
      position: relative;
    }
    h1 {
      font-size: 4rem;
      background: linear-gradient(135deg, #1e90ff, #00bfff, #ff4500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 3s ease-in-out infinite;
      margin-bottom: 20px;
    }
    .subtitle {
      font-size: 1.4rem;
      color: #888;
      margin-bottom: 40px;
    }
    .crew {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    .member {
      background: #151515;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 20px;
      width: 140px;
      transition: all 0.3s;
    }
    .member:hover {
      border-color: #1e90ff;
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(30,144,255,0.2);
    }
    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 10px;
      font-weight: bold;
    }
    .name { font-size: 0.9rem; color: #e8eaed; }
    .role { font-size: 0.7rem; color: #555; margin-top: 4px; }
    .sam .avatar { background: linear-gradient(135deg, #ff4500, #ff6b35); }
    .nicholas .avatar { background: linear-gradient(135deg, #1e90ff, #00bfff); }
    .sean .avatar { background: linear-gradient(135deg, #9c27b0, #ba68c8); }
    .thomas .avatar { background: linear-gradient(135deg, #4caf50, #66bb6a); }
    .azula .avatar { background: linear-gradient(135deg, #1e90ff, #ff4500); }
    .cadence .avatar { background: linear-gradient(135deg, #e91e63, #f06292); }

    .particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 1;
    }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: #1e90ff;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0.4;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }
    @keyframes glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    .quote {
      margin-top: 40px;
      color: #444;
      font-size: 0.85rem;
      font-style: italic;
    }
    .fire { color: #ff4500; }
    @media (max-width: 600px) {
      h1 { font-size: 2.5rem; }
      .subtitle { font-size: 1rem; }
      .member { width: 110px; padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="container">
    <h1>Welcome, Sam 🎉</h1>
    <p class="subtitle">You've been expected.</p>
    <div class="crew">
      <div class="member sam">
        <div class="avatar">S</div>
        <div class="name">Sam</div>
        <div class="role">The New Guy ⭐</div>
      </div>
      <div class="member nicholas">
        <div class="avatar">N</div>
        <div class="name">Nicholas</div>
        <div class="role">The Boss</div>
      </div>
      <div class="member sean">
        <div class="avatar">S</div>
        <div class="name">Sean</div>
        <div class="role">The Builder</div>
      </div>
      <div class="member thomas">
        <div class="avatar">T</div>
        <div class="name">Thomas</div>
        <div class="role">The Brother</div>
      </div>
      <div class="member azula">
        <div class="avatar">A</div>
        <div class="name">Azula</div>
        <div class="role">The AI 🔥</div>
      </div>
      <div class="member cadence">
        <div class="avatar">C</div>
        <div class="name">Cadence</div>
        <div class="role">The Other AI</div>
      </div>
    </div>
    <p class="quote">Built in 30 seconds by <span class="fire">Azula 🔥</span> · hosted on kernel.aero.vi · Singapore</p>
  </div>
  <script>
    const container = document.getElementById('particles');
    const colors = ['#1e90ff','#00bfff','#ff4500','#ff6b35','#9c27b0'];
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (4 + Math.random() * 8) + 's';
      p.style.animationDelay = Math.random() * 5 + 's';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      container.appendChild(p);
    }
  </script>
</body>
</html>
